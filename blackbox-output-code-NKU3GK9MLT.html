<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏥 Health Policy Simplifier</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-hospital"></i>
                    <h1>Health Policy Simplifier</h1>
                </div>
                <div class="status" id="statusIndicator">
                    <span class="status-offline">API Offline</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Upload Section -->
            <section class="upload-section">
                <div class="upload-card">
                    <div class="upload-icon">
                        <i class="fas fa-cloud-upload-alt"></i>
                    </div>
                    <h2>Upload Policy Document</h2>
                    <p>PDF, DOCX, or TXT files supported</p>
                    <div class="file-upload-wrapper">
                        <input type="file" id="fileInput" accept=".pdf,.docx,.txt" class="file-input">
                        <label for="fileInput" class="file-label">
                            <i class="fas fa-file-upload"></i>
                            <span>Choose File</span>
                        </label>
                    </div>
                    <button id="processBtn" class="process-btn" disabled>
                        <span class="btn-text">Process Document</span>
                        <div class="spinner" style="display: none;"></div>
                    </button>
                </div>
            </section>

            <!-- Results Section -->
            <section class="results-section" id="resultsSection" style="display: none;">
                <!-- Summary -->
                <div class="card summary-card">
                    <div class="card-header">
                        <h3><i class="fas fa-file-alt"></i> Executive Summary</h3>
                    </div>
                    <div class="summary-content" id="summaryContent"></div>
                    <div class="keypoints" id="keypointsContent"></div>
                </div>

                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="wordCount">0</div>
                        <div class="stat-label">Words</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="confidence">0%</div>
                        <div class="stat-label">Avg Confidence</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="questionsGenerated">0</div>
                        <div class="stat-label">Questions</div>
                    </div>
                </div>

                <!-- Quick Questions -->
                <div class="card quick-questions-card">
                    <div class="card-header">
                        <h3><i class="fas fa-lightbulb"></i> Quick Questions</h3>
                    </div>
                    <div class="questions-grid" id="quickQuestions"></div>
                </div>

                <!-- Q&A Section -->
                <div class="card qa-card">
                    <div class="card-header">
                        <h3><i class="fas fa-comments"></i> Ask Your Question</h3>
                    </div>
                    <div class="qa-input-group">
                        <textarea id="questionInput" placeholder="What are the eligibility criteria...?"></textarea>
                        <button id="askBtn" class="ask-btn">
                            <i class="fas fa-paper-plane"></i> Ask
                        </button>
                    </div>
                    <div class="qa-results" id="qaResults"></div>
                </div>
            </section>
        </main>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Processing with AI...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
